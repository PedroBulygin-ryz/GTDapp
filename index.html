<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bubbles GTD</title>
    <style>
:root {
  color-scheme: light;
  --ink: #17201b;
  --muted: #66736c;
  --line: #dce5de;
  --paper: #fbfcf7;
  --panel: #ffffff;
  --green: #1f8a70;
  --green-dark: #116150;
  --mint: #dff5e9;
  --blue: #2563eb;
  --yellow: #f4b942;
  --red: #d94f45;
  --shadow: 0 18px 48px rgba(24, 38, 30, 0.11);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(31, 138, 112, 0.16), transparent 28rem),
    linear-gradient(135deg, #fbfcf7 0%, #eef6f0 100%);
  color: var(--ink);
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
    sans-serif;
}

button,
input,
textarea,
select {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
  padding: 32px 0 48px;
}

.topbar {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 22px;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--green-dark);
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 4px;
  font-size: clamp(2.2rem, 7vw, 5rem);
  line-height: 0.92;
  letter-spacing: 0;
}

.subtitle {
  margin-bottom: 0;
  color: var(--muted);
  font-size: 1rem;
}

.scoreboard {
  display: grid;
  grid-template-columns: repeat(3, minmax(84px, 1fr));
  gap: 10px;
  min-width: min(390px, 100%);
}

.scoreboard div {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.78);
  padding: 12px 14px;
  box-shadow: 0 8px 24px rgba(24, 38, 30, 0.06);
}

.scoreboard span {
  display: block;
  font-size: 1.6rem;
  font-weight: 850;
}

.scoreboard small {
  color: var(--muted);
  font-size: 0.76rem;
}

.focus-view,
.bubble {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.88);
  box-shadow: var(--shadow);
}

.focus-view h2 {
  margin-bottom: 5px;
  font-size: 1.3rem;
}

.focus-view p {
  margin-bottom: 0;
  color: var(--muted);
}

.capture-form {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
}

.quick-inbox,
.data-file-panel {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 12px;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--paper);
  margin-top: 12px;
  padding: 12px;
}

.data-file-panel {
  background: white;
}

.quick-inbox h3,
.data-file-panel h3 {
  margin-bottom: 3px;
  font-size: 0.98rem;
}

.quick-inbox p,
.data-file-panel p {
  font-size: 0.82rem;
}

.quick-status {
  display: grid;
  place-items: center;
  min-width: 34px;
  height: 34px;
  border-radius: 999px;
  background: var(--line);
  color: var(--muted);
  font-weight: 900;
}

.quick-status.has-items {
  background: #fff3c7;
  color: #76570d;
}

.quick-actions {
  display: flex;
  gap: 8px;
}

.help-button {
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: white;
  color: var(--green-dark);
  font-weight: 900;
}

.shortcut-help {
  position: relative;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #f8fffb;
  margin-top: 10px;
  padding: 14px 52px 14px 14px;
}

.shortcut-help h3 {
  margin-bottom: 8px;
  font-size: 1rem;
}

.shortcut-help p {
  margin-bottom: 6px;
  font-size: 0.88rem;
}

.shortcut-help code {
  border: 1px solid var(--line);
  border-radius: 6px;
  background: white;
  padding: 1px 5px;
}

.hidden-file {
  display: none;
}

.capture-form input,
.task-editor input,
.task-editor textarea,
.task-editor select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--paper);
  color: var(--ink);
  outline: none;
}

.capture-form input {
  min-height: 48px;
  padding: 0 14px;
}

.capture-form input:focus,
.task-editor input:focus,
.task-editor textarea:focus,
.task-editor select:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(31, 138, 112, 0.14);
}

.capture-form button,
.primary-button,
.secondary-button,
.danger-button,
.flow-step {
  border: 0;
  border-radius: 8px;
  min-height: 42px;
  padding: 0 15px;
  font-weight: 800;
}

.capture-form button,
.primary-button {
  background: var(--green);
  color: white;
}

.secondary-button {
  border: 1px solid var(--line);
  background: white;
  color: var(--ink);
}

.danger-button {
  background: #ffe6e3;
  color: #9f241c;
}

.flow-strip {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 8px;
  margin: 16px 0;
}

.flow-step {
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.72);
  color: var(--muted);
}

.flow-step.active {
  border-color: var(--green);
  background: var(--mint);
  color: var(--green-dark);
}

.stage-indicator {
  margin: -4px 0 12px;
  color: var(--green-dark);
  font-size: 0.9rem;
  font-weight: 850;
}

.focus-view {
  min-height: 176px;
  margin-bottom: 18px;
  padding: 18px;
}

.stage-header {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 14px;
  align-items: start;
  border-bottom: 1px solid var(--line);
  padding-bottom: 16px;
  margin-bottom: 16px;
}

.stage-number {
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border-radius: 999px;
  background: var(--green);
  color: white;
  font-weight: 900;
}

.stage-label {
  margin-bottom: 3px;
  color: var(--green-dark);
  font-size: 0.74rem;
  font-weight: 850;
  letter-spacing: 0;
  text-transform: uppercase;
}

.muted-stage .stage-number {
  background: var(--line);
  color: var(--muted);
}

.stage-list {
  display: grid;
  gap: 10px;
  margin-top: 16px;
}

.section-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.section-title h3 {
  margin-bottom: 0;
  font-size: 1rem;
}

.section-title span {
  display: grid;
  place-items: center;
  min-width: 30px;
  height: 30px;
  border-radius: 999px;
  background: var(--mint);
  color: var(--green-dark);
  font-weight: 900;
}

.section-title-button {
  width: 100%;
  border: 0;
  background: transparent;
  color: inherit;
  cursor: pointer;
  font: inherit;
  padding: 0;
  text-align: left;
}

.section-title-button:hover h3 {
  color: var(--green-dark);
}

.section-title-meta {
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title-meta small {
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 850;
}

.process-layout {
  display: grid;
  grid-template-columns: minmax(230px, 0.45fr) minmax(300px, 1fr);
  gap: 16px;
  align-items: start;
}

.organize-grid,
.review-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}

.compact-bubble {
  min-height: 180px;
  box-shadow: none;
}

.review-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--paper);
  padding: 14px;
}

.review-card span {
  display: grid;
  place-items: center;
  width: 34px;
  height: 34px;
  border-radius: 999px;
  margin-bottom: 10px;
  font-weight: 900;
}

.review-card.ok span {
  background: var(--mint);
  color: var(--green-dark);
}

.review-card.needs-work span {
  background: #ffe6e3;
  color: #9f241c;
}

.review-card h3 {
  margin-bottom: 5px;
  font-size: 1rem;
}

.review-card p {
  font-size: 0.86rem;
}

.decision-panel,
.decision-card {
  min-width: 0;
}

.decision-card {
  display: grid;
  gap: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--paper);
  padding: 14px;
}

.decision-card h3 {
  margin-bottom: 0;
  overflow-wrap: anywhere;
  font-size: 1.18rem;
}

.decision-card h4 {
  margin: 0;
  font-size: 0.95rem;
}

.decision-card label {
  display: grid;
  gap: 6px;
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 750;
}

.decision-card input,
.decision-card textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: white;
  color: var(--ink);
  outline: none;
  padding: 10px 11px;
}

.decision-card textarea {
  min-height: 72px;
  resize: vertical;
}

.decision-card input:focus,
.decision-card textarea:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(31, 138, 112, 0.14);
}

.owner-choice {
  display: grid;
  gap: 8px;
}

.decision-card .check-option {
  display: flex;
  align-items: center;
  gap: 8px;
  width: fit-content;
  color: var(--ink);
  font-size: 0.9rem;
  font-weight: 800;
}

.decision-card .check-option input {
  width: auto;
}

.owner-other-field.is-hidden {
  display: none;
}

.decision-group {
  display: grid;
  gap: 9px;
  border-top: 1px solid var(--line);
  padding-top: 13px;
}

.history-list {
  display: grid;
  gap: 8px;
  margin: 0;
  padding: 0;
  list-style: none;
}

.history-list li {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: start;
  border-left: 3px solid var(--green);
  border-radius: 0 8px 8px 0;
  background: var(--paper);
  padding: 9px 11px;
}

.history-list strong {
  display: block;
  overflow-wrap: anywhere;
  font-size: 0.9rem;
}

.history-list p {
  margin: 3px 0 0;
  font-size: 0.82rem;
}

.history-list span {
  display: block;
  margin-top: 4px;
  color: #839189;
  font-size: 0.74rem;
  font-weight: 700;
}

.history-toggle {
  margin-top: 8px;
}

.pagination {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 10px;
}

.pagination span {
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 750;
}

.pagination button:disabled {
  cursor: not-allowed;
  opacity: 0.45;
}

.empty-decision {
  min-height: 180px;
  place-content: center;
}

.focus-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  margin-top: 16px;
}

.task-editor {
  display: grid;
  grid-template-columns: repeat(2, minmax(180px, 1fr));
  gap: 12px;
  margin-top: 16px;
}

.task-editor label {
  display: grid;
  gap: 5px;
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 750;
}

.task-editor textarea {
  min-height: 86px;
  resize: vertical;
}

.task-editor input,
.task-editor textarea,
.task-editor select {
  padding: 10px 11px;
}

.task-editor .wide {
  grid-column: 1 / -1;
}

.checklist {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 14px;
}

.checklist label {
  display: flex;
  align-items: center;
  gap: 7px;
  color: var(--ink);
  font-size: 0.9rem;
  font-weight: 700;
}

.bubble-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.bubble {
  min-height: 220px;
  padding: 14px;
}

.bubble header {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 10px;
  margin-bottom: 10px;
}

.bubble h2 {
  margin-bottom: 3px;
  font-size: 1rem;
}

.bubble small {
  color: var(--muted);
}

.bubble-count {
  display: grid;
  place-items: center;
  min-width: 32px;
  height: 32px;
  border-radius: 999px;
  background: var(--mint);
  color: var(--green-dark);
  font-weight: 850;
}

.task-list {
  display: grid;
  gap: 9px;
}

.task-card {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--paper);
  padding: 10px;
}

.task-card h3 {
  overflow-wrap: anywhere;
  margin-bottom: 4px;
  font-size: 0.95rem;
}

.task-card p {
  margin-bottom: 0;
  color: var(--muted);
  font-size: 0.8rem;
}

.task-card .task-meta {
  margin-top: 3px;
  color: #839189;
  font-size: 0.74rem;
}

.due-badge {
  display: inline-flex;
  width: fit-content;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: white;
  margin: 0 0 5px;
  padding: 3px 8px;
  color: var(--muted);
  font-size: 0.72rem;
  font-weight: 850;
}

.due-badge.overdue {
  border-color: #f0c9c6;
  background: #fff0ef;
  color: #9b2f28;
}

.due-badge.today {
  border-color: #f3d78b;
  background: #fff6d8;
  color: #76570d;
}

.due-badge.soon {
  border-color: #cfe7d8;
  background: #f3fbf6;
  color: var(--green-dark);
}

.compact-card {
  align-items: center;
}

.organize-card {
  align-items: center;
  grid-template-columns: 1fr auto;
}

.organize-card.expanded {
  align-items: start;
  border-color: var(--green);
  background: #f8fffb;
}

.organize-summary {
  cursor: pointer;
}

.done-card {
  border-color: #cfe7d8;
  background: #f3fbf6;
}

.week-list {
  display: grid;
  gap: 10px;
}

.week-group {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: white;
  overflow: hidden;
}

.week-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  width: 100%;
  border: 0;
  background: transparent;
  color: inherit;
  padding: 13px 14px;
  text-align: left;
}

.week-header h3 {
  margin-bottom: 3px;
  font-size: 1rem;
}

.week-header p {
  margin: 0;
  color: var(--muted);
  font-size: 0.82rem;
}

.week-header span {
  display: grid;
  place-items: center;
  min-width: 34px;
  height: 34px;
  border-radius: 999px;
  background: var(--mint);
  color: var(--green-dark);
  font-weight: 900;
}

.week-header:hover h3 {
  color: var(--green-dark);
}

.week-body {
  border-top: 1px solid var(--line);
  background: #f8fffb;
  padding: 10px;
}

.mini-actions {
  display: flex;
  gap: 5px;
}

.task-details {
  position: relative;
  grid-column: 1 / -1;
  border-top: 1px solid var(--line);
  margin-top: 6px;
  padding-top: 10px;
}

.close-details {
  position: absolute;
  top: 8px;
  right: 0;
  display: grid;
  place-items: center;
  width: 30px;
  height: 30px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: white;
  color: var(--muted);
  font-weight: 900;
}

.detail-editor {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.detail-editor label {
  display: grid;
  gap: 5px;
  color: var(--muted);
  font-size: 0.74rem;
  font-weight: 850;
  text-transform: uppercase;
}

.detail-editor input,
.detail-editor textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: white;
  color: var(--ink);
  outline: none;
  padding: 9px 10px;
  text-transform: none;
}

.detail-editor textarea {
  min-height: 78px;
  resize: vertical;
}

.detail-editor input:focus,
.detail-editor textarea:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(31, 138, 112, 0.14);
}

.detail-editor .wide {
  grid-column: 1 / -1;
}

.detail-history {
  margin-top: 12px;
}

.detail-history h4 {
  margin: 0 0 8px;
  font-size: 0.92rem;
}

.task-select {
  display: grid;
  gap: 4px;
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--paper);
  color: var(--ink);
  padding: 11px;
  text-align: left;
}

.task-select strong {
  overflow-wrap: anywhere;
}

.task-select span {
  color: var(--muted);
  font-size: 0.8rem;
}

.task-select .due-badge {
  color: var(--muted);
  font-size: 0.72rem;
}

.task-select .due-badge.overdue {
  color: #9b2f28;
}

.task-select .due-badge.today {
  color: #76570d;
}

.task-select .due-badge.soon {
  color: var(--green-dark);
}

.task-select.selected {
  border-color: var(--green);
  background: var(--mint);
  box-shadow: 0 0 0 3px rgba(31, 138, 112, 0.12);
}

.task-card menu {
  display: flex;
  gap: 5px;
  margin: 0;
  padding: 0;
}

.icon-button {
  display: grid;
  place-items: center;
  width: 30px;
  height: 30px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: white;
  color: var(--muted);
  font-weight: 850;
}

.empty {
  display: grid;
  place-items: center;
  min-height: 96px;
  border: 1px dashed var(--line);
  border-radius: 8px;
  color: var(--muted);
  text-align: center;
}

.badge-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}

.badge {
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--paper);
  padding: 7px 10px;
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 750;
}

.badge.earned {
  border-color: #e3b638;
  background: #fff3c7;
  color: #76570d;
}

@media (max-width: 860px) {
  .topbar {
    display: grid;
    align-items: stretch;
  }

  .flow-strip,
  .bubble-grid,
  .organize-grid,
  .review-grid {
    grid-template-columns: 1fr;
  }

  .capture-form,
  .quick-inbox,
  .data-file-panel,
  .task-editor,
  .process-layout,
  .detail-editor {
    grid-template-columns: 1fr;
  }

  .quick-actions {
    display: grid;
  }

  .scoreboard {
    grid-template-columns: repeat(3, 1fr);
    min-width: 0;
  }
}

@media (max-width: 520px) {
  .app-shell {
    width: min(100% - 20px, 1180px);
    padding-top: 18px;
  }

  .scoreboard {
    grid-template-columns: 1fr;
  }
}
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <section>
          <p class="eyebrow">GTD local</p>
          <h1>Bubbles</h1>
          <p class="subtitle">Tu cabeza resuelve. Las burbujas almacenan.</p>
        </section>
      </header>

      <section class="flow-strip" aria-label="Flujo GTD">
        <button type="button" class="flow-step active" data-view="collect">Recopilar</button>
        <button type="button" class="flow-step" data-view="process">Procesar</button>
        <button type="button" class="flow-step" data-view="organize">Organizar</button>
        <button type="button" class="flow-step" data-view="review">Revisar</button>
        <button type="button" class="flow-step" data-view="do">Hacer</button>
        <button type="button" class="flow-step" data-view="history">Historial</button>
      </section>

      <p id="stage-indicator" class="stage-indicator" aria-live="polite"></p>

      <section id="focus-view" class="focus-view"></section>

      <section class="bubble-grid" id="bubble-grid" aria-label="Burbujas"></section>

          <p></p>
        </div>

          <button class="icon-button" data-action="delete" title="Eliminar">×</button>
        </menu>
      </article>
    </template>
    <script>
const BUBBLES = [
  { id: "inbox", title: "Recopiladas", hint: "Aun no fueron procesadas." },
  { id: "next", title: "Proximas acciones", hint: "Acciones concretas para hacer." },
  { id: "projects", title: "Proyectos", hint: "Requieren mas de una accion." },
  { id: "waiting", title: "En espera", hint: "Delegadas o bloqueadas por terceros." },
  { id: "someday", title: "Algun dia / Quizas", hint: "No son para ahora." },
  { id: "reference", title: "Referencia", hint: "No requieren accion." },
  { id: "done", title: "Hecho", hint: "Verificado, comunicado y cerrado." },
];

const STORAGE_KEY = "bubbles-gtd-v2";
const DATA_FILE_DB = "bubbles-gtd-file";
const DATA_FILE_STORE = "handles";
const DATA_FILE_KEY = "primary";
const DATA_FILE_VERSION = 1;
const DEFAULT_OWNER = "Yo";

const defaultState = {
  tasks: [],
  points: 0,
  streak: 0,
  currentView: "collect",
  selectedTaskId: "",
  selectedOrganizeTaskId: "",
  expandedHistoryTaskIds: [],
  historyPage: 0,
  donePage: 0,
  reviewDoneOpen: false,
  expandedCompletedWeekKeys: null,
  showShortcutHelp: false,
};

let state = loadState();
let dataFile = {
  handle: null,
  name: "",
  status: "Usando guardado del navegador.",
  connected: false,
  autoSave: false,
  supported: "showOpenFilePicker" in window && "showSaveFilePicker" in window,
};
let dataFileWriteQueue = Promise.resolve();
let quickInbox = {
  fileName: "",
  lines: [],
  status: "Sin revisar",
};

const els = {
  focus: document.querySelector("#focus-view"),
  grid: document.querySelector("#bubble-grid"),
  indicator: document.querySelector("#stage-indicator"),
  flowButtons: [...document.querySelectorAll(".flow-step")],
};

function loadState() {
  try {
    const v2 = localStorage.getItem(STORAGE_KEY);
    const v1 = localStorage.getItem("bubbles-gtd-v1");
    return normalizeState({ ...defaultState, ...JSON.parse(v2 || v1 || "{}") });
  } catch {
    return { ...defaultState };
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch {
    // Si el navegador bloquea localStorage, la sesion actual sigue funcionando.
  }
  queueDataFileWrite();
}

function exportData() {
  return {
    app: "Bubbles GTD",
    version: DATA_FILE_VERSION,
    exportedAt: new Date().toISOString(),
    state,
  };
}

function normalizeImportedState(data) {
  const importedState = data?.state || data;
  if (!importedState || !Array.isArray(importedState.tasks)) {
    throw new Error("Archivo invalido");
  }
  return normalizeState({ ...defaultState, ...importedState });
}

function normalizeState(nextState) {
  return {
    ...defaultState,
    ...nextState,
    tasks: (nextState.tasks || []).map((task) => ({
      ...task,
      owner: task.owner?.trim() || DEFAULT_OWNER,
    })),
  };
}

function openDataFileDb() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DATA_FILE_DB, 1);
    request.onupgradeneeded = () => request.result.createObjectStore(DATA_FILE_STORE);
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function getStoredDataFileHandle() {
  const db = await openDataFileDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DATA_FILE_STORE, "readonly");
    const request = tx.objectStore(DATA_FILE_STORE).get(DATA_FILE_KEY);
    request.onsuccess = () => resolve(request.result || null);
    request.onerror = () => reject(request.error);
  });
}

async function storeDataFileHandle(handle) {
  const db = await openDataFileDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DATA_FILE_STORE, "readwrite");
    tx.objectStore(DATA_FILE_STORE).put(handle, DATA_FILE_KEY);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function hasDataFilePermission(handle, request = false) {
  const options = { mode: "readwrite" };
  if ((await handle.queryPermission(options)) === "granted") return true;
  return request && (await handle.requestPermission(options)) === "granted";
}

async function initStoredDataFile() {
  if (!dataFile.supported) {
    dataFile.status = "Tu navegador no permite guardar en un archivo local desde esta vista.";
    render();
    return;
  }
  try {
    const handle = await getStoredDataFileHandle();
    if (!handle) return;
    dataFile.handle = handle;
    dataFile.name = handle.name;
    dataFile.connected = await hasDataFilePermission(handle);
    dataFile.autoSave = dataFile.connected;
    dataFile.status = dataFile.connected
      ? `Archivo conectado: ${handle.name}`
      : `Archivo recordado: ${handle.name}. Falta dar permiso.`;
    render();
  } catch {
    dataFile.status = "No pude recuperar el archivo de datos anterior.";
    render();
  }
}

async function writeDataFile() {
  if (!dataFile.handle || !dataFile.connected || !dataFile.autoSave) return;
  const writable = await dataFile.handle.createWritable();
  await writable.write(JSON.stringify(exportData(), null, 2));
  await writable.close();
  dataFile.status = `Guardado en ${dataFile.name || dataFile.handle.name}`;
}

function queueDataFileWrite() {
  if (!dataFile.handle || !dataFile.connected || !dataFile.autoSave) return;
  dataFileWriteQueue = dataFileWriteQueue
    .then(() => writeDataFile())
    .catch(() => {
      dataFile.status = "No pude guardar en el archivo. Volve a conectarlo.";
      dataFile.connected = false;
      dataFile.autoSave = false;
      render();
    });
}

function uid() {
  return globalThis.crypto?.randomUUID
    ? crypto.randomUUID()
    : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function createTask(title) {
  const now = new Date().toISOString();
  state.tasks.unshift({
    id: uid(),
    title,
    notes: "",
    bubble: "inbox",
    createdAt: now,
    updatedAt: now,
    dueDate: "",
    completedAt: "",
    nextAction: "",
    owner: DEFAULT_OWNER,
    status: "unprocessed",
    doneChecklist: {
      verified: false,
      communicated: false,
      closed: false,
    },
    history: [
      {
        id: uid(),
        at: now,
        text: "Ingresada en Recopilar",
      },
    ],
  });
  saveAndRender();
}

function createTasks(titles, sourceText = "Importada desde capturas rapidas") {
  const now = new Date().toISOString();
  const newTasks = titles.map((title) => ({
    id: uid(),
    title,
    notes: "",
    bubble: "inbox",
    createdAt: now,
    updatedAt: now,
    dueDate: "",
    completedAt: "",
    nextAction: "",
    owner: DEFAULT_OWNER,
    status: "unprocessed",
    doneChecklist: {
      verified: false,
      communicated: false,
      closed: false,
    },
    history: [
      {
        id: uid(),
        at: now,
        text: sourceText,
      },
    ],
  }));
  state.tasks = [...newTasks, ...state.tasks];
  saveAndRender();
}

function addHistory(task, text) {
  return [
    ...(task.history || []),
    {
      id: uid(),
      at: new Date().toISOString(),
      text,
    },
  ];
}

function updateTask(id, patch, historyText = "") {
  state.tasks = state.tasks.map((task) =>
    task.id === id
      ? {
          ...task,
          ...patch,
          history: historyText ? addHistory(task, historyText) : patch.history || task.history || [],
          updatedAt: new Date().toISOString(),
        }
      : task,
  );
  saveAndRender();
}

function deleteTask(id) {
  state.tasks = state.tasks.filter((task) => task.id !== id);
  if (state.selectedTaskId === id) state.selectedTaskId = "";
  saveAndRender();
}

function processTask(id, patch) {
  state.selectedTaskId = "";
  const task = state.tasks.find((item) => item.id === id);
  const targetBubble = patch.bubble || task?.bubble;
  const targetTitle = BUBBLES.find((bubble) => bubble.id === targetBubble)?.title;
  const historyText =
    targetTitle && targetBubble !== task?.bubble ? `Movida a ${targetTitle}` : "";
  updateTask(id, { status: "processed", ...patch }, historyText);
}

function getTasks(bubble) {
  return state.tasks.filter((task) => task.bubble === bubble);
}

function sortByDueDate(tasks) {
  return [...tasks].sort((a, b) => {
    const aTime = dueDateTime(a.dueDate);
    const bTime = dueDateTime(b.dueDate);
    if (aTime !== bTime) return aTime - bTime;
    return new Date(a.createdAt || a.updatedAt) - new Date(b.createdAt || b.updatedAt);
  });
}

function dueDateTime(value) {
  if (!value) return Number.POSITIVE_INFINITY;
  const date = parseDueDate(value);
  return date ? date.getTime() : Number.POSITIVE_INFINITY;
}

function saveAndRender() {
  saveState();
  render();
}

function setView(view) {
  state.currentView = view;
  state.selectedTaskId = "";
  state.selectedOrganizeTaskId = "";
  state.historyPage = 0;
  saveAndRender();
  els.focus.scrollIntoView({ behavior: "smooth", block: "start" });
}

function render() {
  renderFlow();
  renderFocus();
  renderBubbles();
}

function renderFlow() {
  els.flowButtons.forEach((button) => {
    const active = button.dataset.view === state.currentView;
    button.classList.toggle("active", active);
    button.setAttribute("aria-current", active ? "step" : "false");
  });
  const activeLabel =
    els.flowButtons.find((button) => button.dataset.view === state.currentView)?.textContent ||
    "Recopilar";
  els.indicator.textContent = `Estas en: ${activeLabel}`;
}

}

function formatDate(value) {
  if (!value) return "Sin fecha";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return "Sin fecha";
  return new Intl.DateTimeFormat("es-AR", {
    day: "2-digit",
    month: "short",
    hour: "2-digit",
    minute: "2-digit",
  }).format(date);
}

function getCompletedWeeks() {
  const closedTasks = sortByCompletedDate(getTasks("done"));
  const weeks = new Map();
  closedTasks.forEach((task) => {
    const closedAt = parseDate(task.completedAt || task.updatedAt);
    const weekStart = getWeekStart(closedAt || new Date());
    const key = toDateKey(weekStart);
    if (!weeks.has(key)) {
      weeks.set(key, {
        key,
        start: weekStart,
        end: addDays(weekStart, 6),
        tasks: [],
      });
    }
    weeks.get(key).tasks.push(task);
  });
  return [...weeks.values()]
    .sort((a, b) => b.start - a.start)
    .map((week) => ({
      ...week,
      label: `Semana del ${formatWeekDay(week.start)} al ${formatWeekDay(week.end)}`,
    }));
}

function initializeCompletedWeeks(weeks) {
  if (Array.isArray(state.expandedCompletedWeekKeys)) return;
  state.expandedCompletedWeekKeys = weeks[0] ? [weeks[0].key] : [];
  saveState();
}

function sortByCompletedDate(tasks) {
  return [...tasks].sort(
    (a, b) => {
      const aDate = parseDate(a.completedAt || a.updatedAt);
      const bDate = parseDate(b.completedAt || b.updatedAt);
      return (bDate?.getTime() || 0) - (aDate?.getTime() || 0);
    },
  );
}

function parseDate(value) {
  if (!value) return null;
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? null : date;
}

function getWeekStart(date) {
  const start = new Date(date);
  start.setHours(0, 0, 0, 0);
  const day = start.getDay() || 7;
  start.setDate(start.getDate() - day + 1);
  return start;
}

function addDays(date, days) {
  const next = new Date(date);
  next.setDate(next.getDate() + days);
  return next;
}

function toDateKey(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function formatWeekDay(date) {
  return new Intl.DateTimeFormat("es-AR", {
    day: "2-digit",
    month: "short",
  }).format(date);
}

function getLastActionText(task) {
  return (task.history || [])
    .slice()
    .reverse()
    .find((entry) => entry.text.startsWith("Accion realizada:"))?.text;
}

function parseDueDate(value) {
  if (!value) return null;
  const [year, month, day] = String(value).split("-").map(Number);
  if (!year || !month || !day) return null;
  return new Date(year, month - 1, day);
}

function renderDueBadge(task) {
  const date = parseDueDate(task.dueDate);
  if (!date) return "";
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  date.setHours(0, 0, 0, 0);
  const diffDays = Math.round((date - today) / 86400000);
  let label = `Fecha: ${formatShortDueDate(task.dueDate)}`;
  let tone = "future";
  if (diffDays < 0) {
    label = `Vencida hace ${Math.abs(diffDays)} dia${Math.abs(diffDays) === 1 ? "" : "s"}`;
    tone = "overdue";
  } else if (diffDays === 0) {
    label = "Vence hoy";
    tone = "today";
  } else if (diffDays === 1) {
    label = "Vence manana";
    tone = "soon";
  } else if (diffDays <= 7) {
    label = `Vence en ${diffDays} dias`;
    tone = "soon";
  }
  return `<span class="due-badge ${tone}">${escapeHtml(label)}</span>`;
}

function formatShortDueDate(value) {
  const date = parseDueDate(value);
  if (!date) return "Sin fecha";
  return new Intl.DateTimeFormat("es-AR", {
    day: "2-digit",
    month: "short",
  }).format(date);
}

function escapeHtml(value = "") {
  return String(value).replace(/[&<>"']/g, (char) => {
    const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
    return map[char];
  });
}

function escapeAttr(value = "") {
  return escapeHtml(value).replace(/`/g, "&#096;");
}

document.addEventListener("click", (event) => {
  const closeOrganizeTask = event.target.closest("[data-close-organize-task]");
  if (closeOrganizeTask) {
    state.selectedOrganizeTaskId = "";
    saveAndRender();
    return;
  }

  if (
    state.selectedOrganizeTaskId &&
    state.currentView === "organize" &&
    !event.target.closest(".organize-card.expanded")
  ) {
    state.selectedOrganizeTaskId = "";
    saveAndRender();
    return;
  }

  const flowButton = event.target.closest("[data-view]");
  if (flowButton) {
    event.preventDefault();
    setView(flowButton.dataset.view);
    return;
  }

  if (event.target.closest("[data-open-data-file]")) {
    connectDataFile();
    return;
  }

  if (event.target.closest("[data-create-data-file]")) {
    createDataFile();
    return;
  }

  if (event.target.closest("[data-load-data-file]")) {
    loadFromDataFile();
    return;
  }

  if (event.target.closest("[data-save-data-file]")) {
    saveDataFileNow();
    return;
  }

  if (event.target.closest("[data-refresh-quick-inbox]")) {
    refreshQuickInbox();
    return;
  }

  if (event.target.closest("[data-import-quick-inbox]")) {
    importQuickInbox();
    return;
  }

  if (event.target.closest("[data-toggle-shortcut-help]")) {
    state.showShortcutHelp = !state.showShortcutHelp;
    saveAndRender();
    return;
  }

  const selectedId = event.target.closest("[data-select]")?.dataset.select;
  if (selectedId) {
    state.selectedTaskId = selectedId;
    saveAndRender();
    return;
  }

  const organizeTaskId = event.target.closest("[data-open-organize-task]")?.dataset.openOrganizeTask;
  if (organizeTaskId) {
    state.selectedOrganizeTaskId = state.selectedOrganizeTaskId === organizeTaskId ? "" : organizeTaskId;
    saveAndRender();
    return;
  }

  const deleteId = event.target.closest("[data-delete]")?.dataset.delete;
  if (deleteId) {
    deleteTask(deleteId);
    return;
  }

  const historyDeleteButton = event.target.closest("[data-delete-history]");
  if (historyDeleteButton) {
    deleteHistoryEntry(historyDeleteButton.dataset.taskId, historyDeleteButton.dataset.deleteHistory);
    return;
  }

  const taskHistoryToggle = event.target.closest("[data-toggle-task-history]");
  if (taskHistoryToggle) {
    toggleTaskHistory(taskHistoryToggle.dataset.toggleTaskHistory);
    return;
  }

  if (event.target.closest("[data-toggle-done-list]")) {
    state.reviewDoneOpen = !state.reviewDoneOpen;
    state.donePage = 0;
    saveAndRender();
    return;
  }

  const donePageButton = event.target.closest("[data-done-page]");
  if (donePageButton && !donePageButton.disabled) {
    state.donePage += donePageButton.dataset.donePage === "next" ? 1 : -1;
    if (state.donePage < 0) state.donePage = 0;
    saveAndRender();
    return;
  }

  const historyWeekButton = event.target.closest("[data-toggle-history-week]");
  if (historyWeekButton) {
    toggleCompletedWeek(historyWeekButton.dataset.toggleHistoryWeek);
    return;
  }

  const historyPageButton = event.target.closest("[data-history-page]");
  if (historyPageButton && !historyPageButton.disabled) {
    state.historyPage += historyPageButton.dataset.historyPage === "next" ? 1 : -1;
    if (state.historyPage < 0) state.historyPage = 0;
    saveAndRender();
    return;
  }

  const moveButton = event.target.closest("[data-move-task]");
  if (moveButton) {
    processTask(moveButton.dataset.moveTask, { bubble: moveButton.dataset.target });
    return;
  }

  const logActionId = event.target.closest("[data-log-action]")?.dataset.logAction;
  if (logActionId) {
    logActionDone(logActionId);
    return;
  }

  const completeId = event.target.closest("[data-complete-task]")?.dataset.completeTask;
  if (completeId) {
    completeTask(completeId);
    return;
  }

  const processButton = event.target.closest("[data-process]");
  if (!processButton) return;

  const task = state.tasks.find((item) => item.id === processButton.dataset.process);
  if (!task) return;

  const target = processButton.dataset.target;
  const patch = collectDecisionFields(task.id);

  if (target === "done") {
    processTask(task.id, {
      ...patch,
      bubble: "done",
      status: "done",
      doneChecklist: { verified: true, communicated: true, closed: true },
      completedAt: new Date().toISOString(),
    });
    return;
  }

  processTask(task.id, { ...patch, bubble: target });
});

document.addEventListener("change", (event) => {
  const quickFileInput = event.target.closest("[data-quick-inbox-file]");
  if (quickFileInput) {
    const file = quickFileInput.files?.[0];
    if (!file) return;
    file.text().then((text) => {
      setQuickInboxFromText(text, file.name);
      saveAndRender();
    });
    return;
  }

  const ownerOther = event.target.closest("[data-owner-other]");
  if (ownerOther) {
    const ownerChoice = ownerOther.closest(".owner-choice");
    const ownerInput = ownerChoice?.querySelector("[data-owner-other-input]");
    const ownerField = ownerChoice?.querySelector('[data-field="owner"]');
    ownerChoice?.querySelector(".owner-other-field")?.classList.toggle("is-hidden", !ownerOther.checked);
    if (ownerField) ownerField.value = ownerOther.checked ? ownerInput?.value.trim() || "" : DEFAULT_OWNER;
    if (ownerOther.checked) ownerInput?.focus();
    return;
  }

  const doneCheck = event.target.closest("[data-done-check]");
  if (doneCheck) {
    const taskId = doneCheck.closest("[data-task-id]")?.dataset.taskId;
    const task = state.tasks.find((item) => item.id === taskId);
    if (!task) return;
    updateTask(task.id, {
      doneChecklist: {
        ...(task.doneChecklist || {}),
        [doneCheck.dataset.doneCheck]: doneCheck.checked,
      },
    });
    return;
  }

  const field = event.target.closest("[data-field]");
  if (!field) return;
  const taskId = field.closest("[data-task-id]")?.dataset.taskId;
  const task = state.tasks.find((item) => item.id === taskId);
  if (!task) return;
  const fieldName = field.dataset.field;
  let historyText = "";
  if (fieldName === "nextAction" && field.value.trim() && field.value !== task.nextAction) {
    historyText = `Proxima accion definida: ${field.value.trim()}`;
  }
  if (fieldName === "owner" && field.value.trim() && field.value !== task.owner) {
    historyText = `Responsable / espera: ${field.value.trim()}`;
  }
  updateTask(task.id, { [fieldName]: field.value }, historyText);
});

function collectDecisionFields(taskId) {
  const panel = document.querySelector(`[data-task-id="${taskId}"]`);
  if (!panel) return {};
  const fields = [...panel.querySelectorAll("[data-field]")];
  return fields.reduce((patch, field) => {
    patch[field.dataset.field] = field.value;
    return patch;
  }, {});
}

function parseQuickInbox(text) {
  return text
    .split(/\r?\n/)
    .map((line) => line.trim())
    .filter(Boolean)
    .map((line) => {
      const separator = line.indexOf(" | ");
      return separator >= 0 ? line.slice(separator + 3).trim() : line;
    })
    .filter(Boolean);
}

function setQuickInboxFromText(text, fileName = "inbox.txt") {
  quickInbox.fileName = fileName;
  quickInbox.lines = parseQuickInbox(text);
  quickInbox.status = quickInbox.lines.length
    ? `${quickInbox.lines.length} captura${quickInbox.lines.length === 1 ? "" : "s"} pendiente${quickInbox.lines.length === 1 ? "" : "s"} en ${fileName}`
    : `${fileName} no tiene capturas pendientes`;
}

function refreshQuickInbox() {
  if (location.protocol === "file:") {
    quickInbox.status = "Selecciona el archivo inbox.txt";
    const input = document.querySelector("[data-quick-inbox-file]");
    input?.click();
    saveAndRender();
    return;
  }

  fetch("inbox.txt", { cache: "no-store" })
    .then((response) => (response.ok ? response.text() : ""))
    .then((text) => {
      setQuickInboxFromText(text, "inbox.txt");
      saveAndRender();
    })
    .catch(() => {
      quickInbox.status = "No pude leer inbox.txt. Seleccionalo manualmente.";
      const input = document.querySelector("[data-quick-inbox-file]");
      input?.click();
      saveAndRender();
    });
}

function importQuickInbox() {
  if (!quickInbox.lines.length) return;
  createTasks(quickInbox.lines);
  quickInbox.lines = [];
  quickInbox.status = "Capturas importadas. Usa el atajo de vaciar para limpiar inbox.txt.";
  saveAndRender();
}

async function connectDataFile() {
  if (!dataFile.supported) {
    alert("Este navegador no permite elegir un archivo local de datos desde aca.");
    return;
  }
  try {
    const [handle] = await showOpenFilePicker({
      multiple: false,
      types: [
        {
          description: "Datos de Bubbles",
          accept: { "application/json": [".json"] },
        },
      ],
    });
    if (!(await hasDataFilePermission(handle, true))) {
      dataFile.status = "No se dio permiso para escribir en el archivo.";
      render();
      return;
    }
    dataFile.handle = handle;
    dataFile.name = handle.name;
    dataFile.connected = true;
    dataFile.autoSave = false;
    dataFile.status = `Archivo conectado: ${handle.name}. Carga sus datos o guarda los actuales.`;
    try {
      await storeDataFileHandle(handle);
    } catch {
      dataFile.status = `Archivo conectado: ${handle.name}. Chrome puede pedir elegirlo de nuevo mas adelante.`;
    }
    render();
  } catch (error) {
    if (error?.name === "AbortError") return;
    dataFile.status = "No pude conectar el archivo.";
    render();
  }
}

async function createDataFile() {
  if (!dataFile.supported) {
    alert("Este navegador no permite crear un archivo local de datos desde aca.");
    return;
  }
  try {
    const handle = await showSaveFilePicker({
      suggestedName: "bubbles-data.json",
      types: [
        {
          description: "Datos de Bubbles",
          accept: { "application/json": [".json"] },
        },
      ],
    });
    if (!(await hasDataFilePermission(handle, true))) {
      dataFile.status = "No se dio permiso para escribir en el archivo.";
      render();
      return;
    }
    dataFile.handle = handle;
    dataFile.name = handle.name;
    dataFile.connected = true;
    dataFile.autoSave = true;
    try {
      await storeDataFileHandle(handle);
    } catch {
      dataFile.status = `Archivo creado: ${handle.name}. Chrome puede pedir elegirlo de nuevo mas adelante.`;
    }
    await writeDataFile();
    render();
  } catch (error) {
    if (error?.name === "AbortError") return;
    dataFile.status = "No pude crear el archivo de datos.";
    render();
  }
}

async function loadFromDataFile() {
  if (!dataFile.handle) return;
  try {
    if (!(await hasDataFilePermission(dataFile.handle, true))) {
      dataFile.status = "No se dio permiso para leer el archivo.";
      render();
      return;
    }
    const file = await dataFile.handle.getFile();
    const text = await file.text();
    state = normalizeImportedState(JSON.parse(text));
    dataFile.connected = true;
    dataFile.autoSave = true;
    dataFile.status = `Datos cargados desde ${dataFile.name || dataFile.handle.name}`;
    saveAndRender();
  } catch {
    dataFile.status = "No pude cargar ese archivo de datos.";
    render();
  }
}

async function saveDataFileNow() {
  if (!dataFile.handle) return;
  try {
    if (!(await hasDataFilePermission(dataFile.handle, true))) {
      dataFile.status = "No se dio permiso para escribir en el archivo.";
      render();
      return;
    }
    dataFile.connected = true;
    dataFile.autoSave = true;
    await writeDataFile();
    render();
  } catch {
    dataFile.status = "No pude guardar en el archivo.";
    render();
  }
}

function completeTask(id) {
  const task = state.tasks.find((item) => item.id === id);
  if (!task) return;
  const checklist = task.doneChecklist || {};
  if (!checklist.verified || !checklist.communicated || !checklist.closed) {
    alert("Para cerrar: marca verificada, comunicada y cerrada.");
    return;
  }
  updateTask(
    id,
    { bubble: "done", status: "done", completedAt: new Date().toISOString() },
    "Cerrada Done and Done",
  );
}

function logActionDone(id) {
  const task = state.tasks.find((item) => item.id === id);
  if (!task) return;
  const action = task.nextAction.trim();
  if (!action) {
    alert("Defini una proxima accion antes de registrarla como realizada.");
    return;
  }
  updateTask(id, {}, `Accion realizada: ${action}`);
}

function deleteHistoryEntry(taskId, historyId) {
  const task = state.tasks.find((item) => item.id === taskId);
  if (!task) return;
  updateTask(task.id, {
    history: (task.history || []).filter((entry) => entry.id !== historyId),
  });
}

function toggleTaskHistory(taskId) {
  const expanded = new Set(state.expandedHistoryTaskIds || []);
  if (expanded.has(taskId)) {
    expanded.delete(taskId);
  } else {
    expanded.add(taskId);
  }
  state.expandedHistoryTaskIds = [...expanded];
  saveAndRender();
}

function toggleCompletedWeek(weekKey) {
  const expanded = new Set(state.expandedCompletedWeekKeys || []);
  if (expanded.has(weekKey)) {
    expanded.delete(weekKey);
  } else {
    expanded.add(weekKey);
  }
  state.expandedCompletedWeekKeys = [...expanded];
  saveAndRender();
}

render();
initStoredDataFile();
